<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>กราฟจาก Google Sheets</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .chart-container { width: 80%; max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        h2 { margin-top: 0; color: #333; }
        #loading { font-size: 18px; color: #666; }
    </style>
</head>
<body>

    <div class="chart-container">
        <h2>สรุปเปอร์เซ็นต์งาน</h2>
        <div id="loading">กำลังโหลดข้อมูล...</div>
        <canvas id="myPieChart" style="display:none;"></canvas>
    </div>

    <script>
        // --- ส่วนที่คุณต้องแก้ไข ---
        const sheetId = '<iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTsx21fhnbVJwPM0v5aaBaNZN4VCEY79e82SYbb8M-tdv4nYW7DUPyPtfLvs-dFkj4wMurb1VkKvYwQ/pubhtml?widget=true&amp;headers=false"></iframe>'; // วาง ID ของไฟล์ Google Sheets ของคุณที่นี่
        const sheetName = 'Sheet1';       // ชื่อแผ่นงาน (เช่น Sheet1 หรือ แผ่นงาน1)
        const range = 'A1:B1';            // ช่วงข้อมูลที่คุณต้องการ (A1=OK, B1=Not OK)
        // ---------------------------

        const base = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${sheetName}&range=${range}`;

        async function drawChart() {
            try {
                const response = await fetch(base);
                const data = await response.text();
                
                // แปลงข้อมูล CSV เป็น Array
                const rows = data.split('\n');
                const values = rows[0].split(',').map(v => parseFloat(v.replace(/"/g, '')));

                const okValue = values[0];
                const notOkValue = values[1];

                // ซ่อนข้อความโหลด แสดงกราฟ
                document.getElementById('loading').style.display = 'none';
                document.getElementById('myPieChart').style.display = 'block';

                // สร้างกราฟวงกลม
                const ctx = document.getElementById('myPieChart').getContext('2d');
                new Chart(ctx, {
                    type: 'pie', // หรือ 'doughnut' ถ้าชอบแบบมีรูตรงกลาง
                    data: {
                        labels: ['งาน OK', 'งานไม่โอเค'],
                        datasets: [{
                            data: [okValue, notOkValue],
                            backgroundColor: ['#4472C4', '#ED7D31'], // สีน้ำเงินและส้มตาม Excel ของคุณ
                            borderColor: '#fff',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        let label = context.label || '';
                                        if (label) label += ': ';
                                        if (context.parsed !== null) {
                                            let total = okValue + notOkValue;
                                            let percentage = total > 0 ? Math.round((context.parsed / total) * 100) : 0;
                                            label += context.parsed + ' (' + percentage + '%)';
                                        }
                                        return label;
                                    }
                                }
                            }
                        }
                    }
                });

            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('loading').innerText = 'เกิดข้อผิดพลาดในการโหลดข้อมูล';
            }
        }

        drawChart();
    </script>
</body>
</html>
