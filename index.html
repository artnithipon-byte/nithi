<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(fetchData);

        async function fetchData() {
            // 1. วาง URL ของ Google Sheets (แบบ CSV) ที่นี่
            const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsx21fhnbVJwPM0v5aaBaNZN4VCEY79e82SYbb8M-tdv4nYW7DUPyPtfLvs-dFkj4wMurb1VkKvYwQ/pubhtml'; 

            try {
                const response = await fetch(sheetUrl);
                const text = await response.text();
                const rows = text.split('\n');
                
                // 2. ดึงข้อมูลจากแถวที่ 1 (ในรูปคือ A1=70, B1=10)
                const dataRow = rows[0].split(',');
                const valA = parseFloat(dataRow[0]); // 70
                const valB = parseFloat(dataRow[1]); // 10
                const valC = 100 - (valA + valB);    // ส่วนที่เหลือเพื่อให้เต็มวง

                drawChart(valA, valB, valC);
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        function drawChart(a, b, c) {
            var data = google.visualization.arrayToDataTable([
                ['Category', 'Value'],
                ['ข้อมูล A', a],
                ['ข้อมูล B', b],
                ['อื่นๆ', c]
            ]);

            var options = {
                title: 'สรุปผลขนาดเล็ก',
                pieHole: 0.4, // เป็นกราฟโดนัทเพื่อให้ดูทันสมัย
                width: 300,   // กำหนดความกว้างเล็กๆ
                height: 200,  // กำหนดความสูง
                legend: { position: 'right' }, // เอาคำอธิบายไว้ด้านข้าง
                colors: ['#0F9D58', '#DB4437', '#4285F4'], // สี เขียว, แดง, ฟ้า ตามรูปคุณ
                chartArea: { width: '90%', height: '80%' }
            };

            var chart = new google.visualization.PieChart(document.getElementById('small_chart'));
            chart.draw(data, options);
        }
    </script>

<body>
    <div id="small_chart" style="border: 1px solid #eee; border-radius: 10px; width: 310px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);"></div>
